<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! ❤️</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #fce4ec; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* VIDEO FIX: High Z-Index & Object-Fit */
        #bgVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0; 
            transition: opacity 1s;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 380px;
            width: 85%;
            z-index: 1000;
            text-align: center;
        }

        h1 { color: #ff4d94; margin-bottom: 10px; }
        p { color: #444; font-weight: 500; }

        input {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #ffb3d9;
            margin-bottom: 15px;
            width: 80%;
            font-size: 16px;
        }

        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* 📸 PHOTO POP ANIMATION */
        .popup-photo {
            position: absolute;
            border: 6px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-radius: 12px;
            z-index: 500;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-25deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--r)); opacity: 1; }
        }

        .heart { color: #add8e6; position: absolute; animation: floatUp 4s ease-in infinite; z-index: 40; pointer-events: none; }
        .sparkle { color: #fff; position: absolute; animation: twinkle 2s ease-out forwards; z-index: 60; pointer-events: none; }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        @keyframes twinkle {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #surprise { display: none; }
    </style>
</head>
<body>

    <video id="bgVideo" loop muted playsinline preload="auto">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="card" id="inputSection">
        <h1>Hey Sayang! ❤️</h1>
        <p>Enter your birthday to see your surprise:</p>
        <input type="date" id="birthdate">
        <br>
        <button onclick="launch()">Unlock My Heart</button>
    </div>

    <div class="card" id="surprise">
        <h1>Happy Birthday! 🎉</h1>
        <p>I hope your day is as magical as you are. I'm so lucky to have you. ❤️</p>
        <p><strong>I love you!</strong></p>
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // List of 16 photos
        const photos = [
            'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 
            'photo5.jpg', 'photo6.jpg', 'photo7.jpg', 'photo8.jpg',
            'photo9.jpg', 'photo10.jpg', 'photo11.jpg', 'photo12.jpg',
            'photo13.jpg', 'photo14.jpg', 'photo15.jpg', 'photo16.jpg'
        ];

        function launch() {
            const dateInput = document.getElementById('birthdate').value;
            if (!dateInput) {
                alert("Please select your birthday first!");
                return;
            }

            const video = document.getElementById('bgVideo');
            const music = document.getElementById('bgMusic');

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            
            // 1. VIDEO RECOVERY: Reveal and play
            video.style.opacity = "1";
            video.play();

            music.play();

            // 2. 32 PHOTO POPS: 16 photos popping twice
            let totalCount = 0;
            const maxPops = 32; // This ensures exactly 32 pops happen
            
            const photoInterval = setInterval(() => {
                if (totalCount >= maxPops) {
                    clearInterval(photoInterval);
                    return;
                }
                
                // Using modulo (%) to repeat the 16 photos in order (1-16, then 1-16 again)
                createPhoto(photos[totalCount % photos.length]);
                totalCount++;
            }, 300); // Pops faster (0.3s) so it feels like a celebration!

            setInterval(createHeart, 250);
            setInterval(createSparkle, 350);
        }

        function createPhoto(file) {
            const img = document.createElement('img');
            img.src = file;
            img.className = 'popup-photo';
            
            // Random positions (Avoid center a bit to see the card)
            const x = Math.random() * (window.innerWidth - 180);
            const y = Math.random() * (window.innerHeight - 180);
            const r = (Math.random() * 50) - 25; // More variety in rotation
            const w = 130 + (Math.random() * 90); 

            img.style.left = x + 'px';
            img.style.top = y + 'px';
            img.style.width = w + 'px';
            img.style.setProperty('--r', r + 'deg');
            document.body.appendChild(img);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💙';
            const x = Math.random() * window.innerWidth;
            const speed = 3 + (Math.random() * 2);
            heart.style.left = x + 'px';
            heart.style.fontSize = (20 + Math.random() * 20) + 'px';
            heart.style.animationDuration = speed + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), speed * 1000);
        }

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.innerHTML = '✨';
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const speed = 1 + (Math.random() * 1.5);
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.style.animationDuration = speed + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), speed * 1000);
        }
    </script>
</body>
</html>
