<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise for You</title>
    <style>
        /* Base Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Warm brown background to match the cafe video lighting */
            background-color: #3d312b; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Looping Video Background */
        #bgVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover; /* Ensures video fills the screen without gaps */
            filter: brightness(90%); /* Kept bright so you can see the video clearly */
            display: none; /* Hidden until Unlock button is clicked */
        }

        /* Main Surprise Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-width: 380px;
            width: 85%;
            z-index: 1000;
            text-align: center;
            position: relative;
        }

        h1 { color: #ff4d94; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #444; font-size: 1.1rem; line-height: 1.5; }

        input {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #ffb3d9;
            margin-bottom: 15px;
            width: 80%;
            font-size: 16px;
            outline: none;
        }

        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(255, 77, 148, 0.4);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #ff1a75;
        }

        /* 💙 Floating Light Blue Hearts */
        .heart {
            position: absolute;
            color: #add8e6;
            opacity: 0.8;
            animation: floatUp 4.5s ease-in infinite;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        /* ✨ Blinking Sparkles */
        .sparkle {
            position: absolute;
            color: #fff;
            pointer-events: none;
            animation: twinkle 2s ease-out forwards;
            z-index: 60;
            opacity: 0;
        }

        @keyframes twinkle {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        /* 📸 Photo Pop-up Animation */
        .popup-photo {
            position: absolute;
            border: 6px solid white;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5);
            border-radius: 15px;
            z-index: 100;
            animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--r)); opacity: 1; }
        }

        #surprise { display: none; }
    </style>
</head>
<body>

    <video id="bgVideo" loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="card" id="inputSection">
        <h1>Hey Love! ❤️</h1>
        <p>Enter your birthday to unlock your surprise:</p>
        <input type="date" id="birthdate">
        <br>
        <button onclick="launch()">Unlock My Heart</button>
    </div>

    <div class="card" id="surprise">
        <h1>Happy Birthday! 🎉</h1>
        <p>I hope your day is as magical as you are. I'm so lucky to have you by my side. ❤️</p>
        <p><strong>I love you!</strong></p>
        
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Array for your 16 photos
        const photos = [
            'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 
            'photo5.jpg', 'photo6.jpg', 'photo7.jpg', 'photo8.jpg',
            'photo9.jpg', 'photo10.jpg', 'photo11.jpg', 'photo12.jpg',
            'photo13.jpg', 'photo14.jpg', 'photo15.jpg', 'photo16.jpg'
        ];

        function launch() {
            const dateInput = document.getElementById('birthdate').value;
            if (!dateInput) {
                alert("Please select your birthday first!");
                return;
            }

            // UI Transitions
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            
            // Play Media
            const video = document.getElementById('bgVideo');
            const music = document.getElementById('bgMusic');
            video.style.display = 'block';
            video.play();
            music.play();

            // 1. Pop up the 16 Photos
            let pIndex = 0;
            const photoInterval = setInterval(() => {
                if (pIndex >= photos.length) {
                    clearInterval(photoInterval);
                    return;
                }
                createPhoto(photos[pIndex]);
                pIndex++;
            }, 500); // New photo every 0.5s

            // 2. Start Floating Hearts
            setInterval(createHeart, 300);

            // 3. Start Blinking Sparkles
            setInterval(createSparkle, 400);
        }

        function createPhoto(file) {
            const img = document.createElement('img');
            img.src = file;
            img.className = 'popup-photo';

            // Random positions (avoiding edges)
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 200);
            const rotation = (Math.random() * 40) - 20; // -20 to 20 deg
            const width = 140 + (Math.random() * 80); // 140-220px

            img.style.left = x + 'px';
            img.style.top = y + 'px';
            img.style.width = width + 'px';
            img.style.setProperty('--r', rotation + 'deg');

            document.body.appendChild(img);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💙';

            const x = Math.random() * window.innerWidth;
            const size = 18 + (Math.random() * 20); 
            const speed = 4 + (Math.random() * 2);

            heart.style.left = x + 'px';
            heart.style.fontSize = size + 'px';
            heart.style.animationDuration = speed + 's';

            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), speed * 1000);
        }

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.innerHTML = '✨';

            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const size = 12 + (Math.random() * 18);
            const speed = 1.5 + (Math.random() * 1.5);

            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.style.fontSize = size + 'px';
            sparkle.style.animationDuration = speed + 's';

            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), speed * 1000);
        }
    </script>
</body>
</html>
