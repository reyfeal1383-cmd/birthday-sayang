<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Looping Video Background */
        #bgVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(60%);
            display: none;
        }

        /* Message Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 380px;
            width: 85%;
            z-index: 1000;
            text-align: center;
            position: relative;
        }

        h1 { color: #ff4d94; margin-bottom: 10px; }
        input {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ffb3d9;
            margin-bottom: 15px;
            width: 80%;
            font-size: 16px;
        }

        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Floating Light Blue Heart Styling */
        .heart {
            position: absolute;
            color: #add8e6; /* Light Blue */
            font-size: 20px;
            opacity: 0.8;
            animation: float 4s ease-in infinite;
            pointer-events: none; /* User can't click them */
            z-index: 50; /* Above the video, behind the card/photos */
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Photo Pop-up Styling */
        .popup-photo {
            position: absolute;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-radius: 12px;
            z-index: 100; /* On top of the floating hearts */
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-25deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--r)); opacity: 1; }
        }

        #surprise { display: none; }
    </style>
</head>
<body>

    <video id="bgVideo" loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="card" id="inputSection">
        <h1>Hey Birthday Girl! ❤️</h1>
        <p>Enter your birthday to see your surprise:</p>
        <input type="date" id="birthdate">
        <br>
        <button onclick="launchCelebration()">Unlock My Heart</button>
    </div>

    <div class="card" id="surprise">
        <h1>Happy Birthday! 🎉</h1>
        <p>I hope your day is as magical as you are. Here’s to many more memories together! ❤️</p>
        <p><strong>I love you!</strong></p>
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const photoFiles = [
            'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 
            'photo5.jpg', 'photo6.jpg', 'photo7.jpg', 'photo8.jpg',
            'photo9.jpg', 'photo10.jpg', 'photo11.jpg', 'photo12.jpg',
            'photo13.jpg', 'photo14.jpg', 'photo15.jpg', 'photo16.jpg'
        ];

        function launchCelebration() {
            const dateInput = document.getElementById('birthdate').value;
            if (!dateInput) {
                alert("Enter your birthday first!");
                return;
            }

            // Start Video, Music, and show the message
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            
            const video = document.getElementById('bgVideo');
            video.style.display = 'block';
            video.play();
            document.getElementById('bgMusic').play();

            // Start Popping Photos
            let i = 0;
            const maxPhotos = 16;
            const photoInterval = setInterval(() => {
                spawnPhoto(photoFiles[i % photoFiles.length]);
                i++;
                if (i >= maxPhotos) clearInterval(photoInterval);
            }, 500);

            // Start Spawning Floating Hearts
            setInterval(spawnFloatingHeart, 350); // Creates a heart every 0.25 seconds
        }

        function spawnPhoto(filename) {
            const img = document.createElement('img');
            img.src = filename;
            img.className = 'popup-photo';

            const x = Math.random() * (window.innerWidth - 180);
            const y = Math.random() * (window.innerHeight - 180);
            const r = (Math.random() * 30) - 15;
            const w = 130 + (Math.random() * 70);

            img.style.left = x + 'px';
            img.style.top = y + 'px';
            img.style.width = w + 'px';
            img.style.setProperty('--r', r + 'deg');

            document.body.appendChild(img);
        }

        function spawnFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💙'; // Light Blue Heart emoji

            // Random horizontal position, size, and duration
            const x = Math.random() * window.innerWidth;
            const size = 15 + (Math.random() * 20); // 15-35px
            const duration = 3 + (Math.random() * 2); // 3-5s

            heart.style.left = x + 'px';
            heart.style.fontSize = size + 'px';
            heart.style.animationDuration = duration + 's';

            document.body.appendChild(heart);

            // Remove heart after animation finishes
            setTimeout(() => heart.remove(), duration * 1000);
        }
    </script>
</body>
</html>
