<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            /* Soft Pink to Light Blue Gradient */
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 85%;
            z-index: 1000;
            text-align: center;
            position: relative;
        }

        h1 { color: #ff4d94; margin-bottom: 15px; font-size: 1.8rem; }
        p { color: #444; font-size: 1.1rem; line-height: 1.6; font-weight: 500; }

        input {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #ffb3d9;
            margin: 20px 0;
            width: 100%;
            font-size: 16px;
            outline: none;
        }

        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); background-color: #ff1a75; }

        /* Photo Pop-ups */
        .popup-photo {
            position: absolute;
            border: 6px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-radius: 15px;
            z-index: 500;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--r)); opacity: 1; }
        }

        /* 💙 Light Blue Hearts - High Intensity */
        .heart {
            position: absolute;
            color: #add8e6;
            z-index: 400;
            animation: floatUp 4s linear infinite;
            pointer-events: none;
        }

        /* ✨ Sparkles */
        .sparkle {
            position: absolute;
            color: #fff;
            font-size: 20px;
            z-index: 600;
            animation: twinkle 1.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        @keyframes twinkle {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #surprise { display: none; }
    </style>
</head>
<body>

    <div class="card" id="inputSection">
        <h1>Hey Sayang! ❤️</h1>
        <p>Enter your birthday to see your surprise:</p>
        <input type="date" id="birthdate">
        <br>
        <button onclick="launch()">Unlock My Heart</button>
    </div>

    <div class="card" id="surprise">
        <h1>Happy Birthday! 🎉</h1>
        <p>I wanted to show you all the reasons I love you, but there isn't enough space on one screen. ❤️</p>
        <p style="margin-top:10px;"><strong>I love you!</strong></p>
        
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const photos = [
            'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 
            'photo5.jpg', 'photo6.jpg', 'photo7.jpg', 'photo8.jpg',
            'photo9.jpg', 'photo10.jpg', 'photo11.jpg', 'photo12.jpg',
            'photo13.jpg', 'photo14.jpg', 'photo15.jpg', 'photo16.jpg'
        ];

        function launch() {
            const dateInput = document.getElementById('birthdate').value;
            if (!dateInput) return alert("Please select your birthday first!");

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            document.getElementById('bgMusic').play();

            // 1. 32 PHOTO POPS (16 photos repeated twice)
            for (let i = 0; i < 32; i++) {
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = photos[i % 16];
                    img.className = 'popup-photo';
                    
                    const x = Math.random() * (window.innerWidth - 180);
                    const y = Math.random() * (window.innerHeight - 180);
                    const r = (Math.random() * 40 - 20);
                    const w = 130 + (Math.random() * 90);

                    img.style.left = x + 'px';
                    img.style.top = y + 'px';
                    img.style.width = w + 'px';
                    img.style.setProperty('--r', r + 'deg');
                    document.body.appendChild(img);
                }, i * 350); 
            }

            // 2. INCREASED LIGHT BLUE HEARTS 💙 (Faster spawn rate)
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = '💙';
                h.style.left = Math.random() * 98 + 'vw';
                // Randomize heart sizes
                h.style.fontSize = (15 + Math.random() * 25) + 'px';
                document.body.appendChild(h);
                // Remove after animation finishes
                setTimeout(() => h.remove(), 4500);
            }, 150); // Spawned twice as fast now (every 150ms)

            // 3. Sparkles ✨
            setInterval(() => {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.innerHTML = '✨';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1500);
            }, 400);
        }
    </script>
</body>
</html>
