<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden; /* Prevents scrollbars when photos pop up */
            transition: background-color 1s;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 400px;
            width: 90%;
            z-index: 1000; /* Keeps the text on top of the pop-up photos */
            position: relative;
        }
        h1 { color: #ff4d94; }
        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }
        /* Style for the popping photos */
        .popup-photo {
            position: absolute;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 1;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--r)); opacity: 1; }
        }
        #surprise { display: none; }
    </style>
</head>
<body>

    <div class="card" id="inputSection">
        <h1>Hey Birthday Girl! ❤️</h1>
        <p>Enter your birthday to see your surprise:</p>
        <input type="date" id="birthdate" style="padding:10px; margin-bottom:15px; border-radius:10px; border:1px solid #ccc;">
        <br>
        <button onclick="startCelebration()">Unlock</button>
    </div>

    <div class="card" id="surprise">
        <h1>Happy Birthday! 🎉</h1>
        <p>I wanted to show you all the reasons I love you, but there isn't enough space on one screen. ❤️</p>
        <p><strong>I love you!</strong></p>
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // List your photo filenames here!
        const photoFiles = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 'photo5.jpg'];

        function startCelebration() {
            const date = document.getElementById('birthdate').value;
            if (!date) {
                alert("Enter your birthday first!");
                return;
            }

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            document.body.style.backgroundColor = "#ffb3d9";
            document.getElementById('bgMusic').play();

            // Start popping photos!
            let count = 0;
            const maxPhotos = 15; // Total number of photos that will pop up
            
            const interval = setInterval(() => {
                createPhoto(photoFiles[count % photoFiles.length]);
                count++;
                if (count >= maxPhotos) clearInterval(interval);
            }, 600); // New photo every 600ms
        }

        function createPhoto(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'popup-photo';
            
            // Randomize position
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 150);
            const rotation = (Math.random() * 40) - 20; // Random tilt
            const size = 100 + (Math.random() * 100); // Random size between 100-200px

            img.style.left = x + 'px';
            img.style.top = y + 'px';
            img.style.width = size + 'px';
            img.style.setProperty('--r', rotation + 'deg');

            document.body.appendChild(img);
        }
    </script>
</body>
</html>
