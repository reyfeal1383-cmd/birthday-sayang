<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! ❤️</title>
    <style>
        /* Simple White Background - No Black Screen Issues */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff; 
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 2000; width: 85%; max-width: 380px;
            position: relative; border: 1px solid #eee;
        }

        h1 { color: #ff4d94; margin-bottom: 10px; }
        p { color: #333; font-weight: 500; line-height: 1.5; }

        input {
            padding: 12px; border-radius: 10px; border: 1px solid #ffb3d9;
            margin: 15px 0; width: 100%; font-size: 16px;
        }

        button {
            background: #ff4d94; color: white; border: none;
            padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer;
        }

        /* Elements */
        .popup-photo {
            position: absolute; border: 5px solid white; border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2); z-index: 1500;
            animation: pop 0.5s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--r)); opacity: 1; }
        }

        .heart {
            position: absolute; color: #add8e6; font-size: 25px;
            z-index: 1000; animation: float 4.5s linear infinite; pointer-events: none;
        }

        .sparkle {
            position: absolute; color: #ffd700; font-size: 20px;
            z-index: 1800; animation: twinkle 1.5s linear forwards; pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes twinkle {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #surprise { display: none; }
    </style>
</head>
<body>

    <div class="card" id="inputSection">
        <h1>Hey Sayang! ❤️</h1>
        <p>Enter your birthday to see your surprise:</p>
        <input type="date" id="birthdate">
        <br>
        <button onclick="launch()">Unlock My Heart</button>
    </div>

    <div class="card" id="surprise">
        <h1>Happy Birthday! 🎉</h1>
        <p>I wanted to show you all the reasons I love you, but there isn't enough space on one screen. ❤️</p>
        <p style="margin-top:10px;"><strong>I love you!</strong></p>
        <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
    </div>

    <script>
        const photos = ['photo1.jpg','photo2.jpg','photo3.jpg','photo4.jpg','photo5.jpg','photo6.jpg','photo7.jpg','photo8.jpg','photo9.jpg','photo10.jpg','photo11.jpg','photo12.jpg','photo13.jpg','photo14.jpg','photo15.jpg','photo16.jpg'];

        function launch() {
            if(!document.getElementById('birthdate').value) return alert("Select date!");

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            document.getElementById('bgMusic').play();

            // 32 Random Pops (16 photos repeated twice)
            for (let i = 0; i < 32; i++) {
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = photos[i % 16];
                    img.className = 'popup-photo';
                    img.style.left = Math.random() * (window.innerWidth - 150) + 'px';
                    img.style.top = Math.random() * (window.innerHeight - 150) + 'px';
                    img.style.width = (130 + Math.random() * 70) + 'px';
                    img.style.setProperty('--r', (Math.random() * 40 - 20) + 'deg');
                    document.body.appendChild(img);
                }, i * 350);
            }

            // High Intensity Blue Hearts 💙
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'heart'; h.innerHTML = '💙';
                h.style.left = Math.random() * 95 + 'vw';
                h.style.fontSize = (15 + Math.random() * 20) + 'px';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4500);
            }, 180); // Fast hearts

            // Sparkles ✨
            setInterval(() => {
                const s = document.createElement('div');
                s.className = 'sparkle'; s.innerHTML = '✨';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1500);
            }, 400);
        }
    </script>
</body>
</html>
