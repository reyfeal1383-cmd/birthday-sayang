<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! ❤️</title>
    <style>
        /* 1. RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #000; /* Dark base so no white flash */
            display: flex; justify-content: center; align-items: center;
        }

        /* 2. THE VIDEO FIX: Full Screen, No Bars, No Gaps */
        #bgVideo {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2; /* Deepest layer */
            transform: translate(-50%, -50%);
            object-fit: cover; /* This kills the black bars */
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* 3. SURPRISE CARD */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            z-index: 1000;
            text-align: center;
            position: relative;
        }

        h1 { color: #ff4d94; margin-bottom: 15px; font-size: 2rem; }
        p { color: #333; font-size: 1.1rem; line-height: 1.6; font-weight: 500; }

        input {
            padding: 12px; border-radius: 12px; border: 2px solid #ffb3d9;
            margin: 20px 0; width: 100%; font-size: 16px; outline: none;
        }

        button {
            background-color: #ff4d94; color: white; border: none;
            padding: 15px 40px; border-radius: 40px; cursor: pointer;
            font-weight: bold; font-size: 1.2rem; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background-color: #ff1a75; }

        /* 4. ANIMATIONS: Photos, Hearts, Sparkles */
        .popup-photo {
            position: absolute; border: 6px solid white; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 500;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--r)); opacity: 1; }
        }

        .heart {
            position: absolute; color: #add8e6; font-size: 25px;
            z-index: 400; animation: floatUp 4s linear infinite; pointer-events: none;
        }

        .sparkle {
            position: absolute; color: #fff; font-size: 20px;
            z-index: 600; animation: twinkle 1.5s ease-out forwards; pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        @keyframes twinkle {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #surprise { display: none; }
    </style>
</head>
<body>

    <video id="bgVideo" loop muted playsinline preload="auto">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="card" id="inputSection">
        <h1>Hey Sayang! ❤️</h1>
        <p>Enter your birthday to see your surprise:</p>
        <input type="date" id="birthdate">
        <br>
        <button onclick="launch()">Unlock My Heart</button>
    </div>

    <div class="card" id="surprise">
        <h1>Happy Birthday! 🎉</h1>
        <p>I wanted to show you all the reasons I love you, but there isn't enough space on one screen. ❤️</p>
        <p style="margin-top:10px;"><strong>I love you!</strong></p>
        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // 16 unique photos
        const photoList = [
            'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 
            'photo5.jpg', 'photo6.jpg', 'photo7.jpg', 'photo8.jpg',
            'photo9.jpg', 'photo10.jpg', 'photo11.jpg', 'photo12.jpg',
            'photo13.jpg', 'photo14.jpg', 'photo15.jpg', 'photo16.jpg'
        ];

        function launch() {
            const dateInput = document.getElementById('birthdate').value;
            if (!dateInput) return alert("Select your birthday first!");

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';

            // VIDEO RECOVERY
            const video = document.getElementById('bgVideo');
            video.style.opacity = "1";
            video.play().catch(e => {
                console.log("Play failed, forcing reload...");
                video.load();
                video.play();
            });

            document.getElementById('bgMusic').play();

            // 32 PHOTO POPS (Random Places, 16 Photos repeated twice)
            for (let i = 0; i < 32; i++) {
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = photoList[i % 16]; // Cycles 1-16 twice
                    img.className = 'popup-photo';
                    
                    // Random positioning
                    const x = Math.random() * (window.innerWidth - 180);
                    const y = Math.random() * (window.innerHeight - 180);
                    const r = (Math.random() * 40 - 20);
                    const w = 140 + (Math.random() * 80);

                    img.style.left = x + 'px';
                    img.style.top = y + 'px';
                    img.style.width = w + 'px';
                    img.style.setProperty('--r', r + 'deg');
                    document.body.appendChild(img);
                }, i * 350); // New photo every 0.35 seconds
            }

            // LIGHT BLUE HEARTS 💙
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = '💙';
                h.style.left = Math.random() * 95 + 'vw';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4500);
            }, 300);

            // SPARKLES ✨
            setInterval(() => {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.innerHTML = '✨';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1500);
            }, 400);
        }
    </script>
</body>
</html>
